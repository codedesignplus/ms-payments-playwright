syntax = "proto3";

import "google/protobuf/wrappers.proto";

option csharp_namespace = "CodeDesignPlus.Net.Microservice.Payments.gRpc";

package Payment;

service Payment {
  rpc InitiatePayment (InitiatePaymentRequest) returns (InitiatePaymentResponse);
}

message InitiatePaymentRequest {
  string id = 1;
  string module = 2;
  string referenceId = 3;
  Amount subTotal = 4;
  Amount tax = 5;
  Amount total = 6;
  string description = 7;
  Buyer buyer = 8;
  Payer payer = 9;
  PaymentMethod paymentMethod = 10;
  PaymentProvider provider = 11;
}

enum PaymentProvider {
  None = 0;
  Payu = 1;
  MercadoPago = 2;
}

message PaymentMethod {
  string type = 1;
  optional CreditCard creditCard = 2;
  optional Pse pse = 3;
}

message Buyer {
  string buyerId = 1;
  string name = 2;
  string phone = 3;
  string email = 4;
  optional TypeDocument typeDocument = 5;
  optional string document = 6;
  optional Address shippingAddress = 7;
}

message Payer {
  string fullName = 1;
  optional string emailAddress = 2;
  optional string contactPhone = 3;
  TypeDocument typeDocument = 4;
  string documentNumber = 5;
  Address billingAddress = 6;
}

message TypeDocument {
  string code = 1;
  string name = 2;
}

message Address {
  string street = 1;
  string country = 2;
  optional string state = 3;
  string city = 4;
  optional string postalCode = 5;
}

message CreditCard {
  string last4Digits = 1;
  string cardHolderName = 2;
  string creditCardTokenId = 3;
  string expirationDate = 4;
  string securityCode = 5;
  int32 installmentsNumber = 6;
}

message Pse {
  string pseCode = 1;
  string typePerson = 2;
  string pseResponseUrl = 3;
}

message Amount {
  int64 value = 1;
  google.protobuf.StringValue currency = 2;
}

enum PaymentStatus {
  Unknown = 0;
  Initiated = 1;
  Succeeded = 2;
  Failed = 3;
  Expired = 4;
  Pending = 5;
}

enum NextActionType {
  Undefined = 0;
  Redirect = 1;
  DisplayWidget = 2;
  WaitConfirmation = 3;
}

message InitiatePaymentResponse {
  bool success = 1;
  string payment_id = 2;
  NextActionType next_action = 3;
  google.protobuf.StringValue redirect_url = 4; 
  map<string, google.protobuf.StringValue> metadata = 5; 
}